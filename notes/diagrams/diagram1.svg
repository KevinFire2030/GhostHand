<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980">
  <defs>
    <style>
      .box{fill:#f7f9fc;stroke:#334155;stroke-width:2;rx:12;ry:12}
      .outer{fill:#ffffff;stroke:#0f172a;stroke-width:3;rx:18;ry:18}
      .txt{font-family:Arial, 'Noto Sans KR', sans-serif;font-size:22px;fill:#0f172a}
      .title{font-family:Arial, 'Noto Sans KR', sans-serif;font-size:28px;font-weight:bold;fill:#0f172a}
      .small{font-family:Arial, 'Noto Sans KR', sans-serif;font-size:18px;fill:#334155}
      .line{stroke:#475569;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#94a3b8;stroke-width:2;fill:none;stroke-dasharray:8 6}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <text x="40" y="45" class="title">도면 1. 자연어 기반 자기 단말 제어 시스템 구성도</text>
  <rect x="30" y="70" width="1340" height="880" class="outer"/>
  <text x="60" y="105" class="small">자기 단말(100)</text>

  <rect x="80" y="140" width="180" height="70" class="box"/><text x="120" y="183" class="txt">사용자</text>
  <rect x="320" y="140" width="220" height="70" class="box"/><text x="390" y="183" class="txt">입력부(110)</text>
  <rect x="610" y="140" width="280" height="70" class="box"/><text x="665" y="183" class="txt">AI 에이전트 실행부(120)</text>

  <rect x="140" y="290" width="240" height="80" class="box"/><text x="185" y="338" class="txt">자연어 해석부(130)</text>
  <rect x="430" y="290" width="250" height="80" class="box"/><text x="465" y="338" class="txt">자기 단말 인식부(140)</text>
  <rect x="730" y="290" width="220" height="80" class="box"/><text x="780" y="338" class="txt">정책 판단부(150)</text>
  <rect x="1000" y="290" width="250" height="80" class="box"/><text x="1035" y="338" class="txt">실행 경로 선택부(160)</text>

  <rect x="210" y="480" width="320" height="80" class="box"/><text x="255" y="528" class="txt">권한 및 보안 관리부(210)</text>
  <rect x="620" y="480" width="360" height="80" class="box"/><text x="660" y="528" class="txt">무선 디버깅/로컬 브리지부(170)</text>

  <rect x="190" y="680" width="220" height="80" class="box"/><text x="245" y="728" class="txt">제어 실행부(180)</text>
  <rect x="500" y="680" width="250" height="80" class="box"/><text x="545" y="728" class="txt">실행 결과 검증부(190)</text>
  <rect x="840" y="680" width="240" height="80" class="box"/><text x="880" y="728" class="txt">대체 경로 선택부(200)</text>
  <rect x="1140" y="680" width="180" height="80" class="box"/><text x="1175" y="728" class="txt">결과 피드백</text>

  <line x1="260" y1="175" x2="320" y2="175" class="line"/>
  <line x1="540" y1="175" x2="610" y2="175" class="line"/>

  <line x1="750" y1="210" x2="260" y2="290" class="line"/>
  <line x1="750" y1="210" x2="555" y2="290" class="line"/>
  <line x1="750" y1="210" x2="840" y2="290" class="line"/>
  <line x1="750" y1="210" x2="1125" y2="290" class="line"/>

  <line x1="840" y1="370" x2="370" y2="480" class="line"/>
  <line x1="370" y1="560" x2="1125" y2="370" class="line"/>
  <line x1="1125" y1="370" x2="800" y2="480" class="line"/>
  <line x1="800" y1="560" x2="300" y2="680" class="line"/>
  <line x1="410" y1="720" x2="500" y2="720" class="line"/>
  <line x1="750" y1="720" x2="840" y2="720" class="line"/>
  <line x1="1080" y1="720" x2="1140" y2="720" class="line"/>
  <path d="M960,680 C1010,610 1070,610 1125,370" class="line"/>
</svg>