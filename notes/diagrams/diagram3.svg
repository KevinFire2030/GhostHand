<svg xmlns="http://www.w3.org/2000/svg" width="980" height="1500" viewBox="0 0 980 1500">
  <defs><style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12;ry:12}.diamond{fill:#fff7ed;stroke:#9a3412;stroke-width:2}.txt{font-family:Arial, 'Noto Sans KR', sans-serif;font-size:22px;fill:#0f172a}.title{font-family:Arial, 'Noto Sans KR', sans-serif;font-size:28px;font-weight:bold;fill:#0f172a}.line{stroke:#475569;stroke-width:3;fill:none;marker-end:url(#arrow)}.label{font-family:Arial, 'Noto Sans KR', sans-serif;font-size:18px;fill:#7c2d12}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker></defs>
